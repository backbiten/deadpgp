name: QA Gate

on:
  push:
    branches: ["main", "copilot/**"]
  pull_request:
    branches: ["main"]

jobs:
  qa:
    name: QA / ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest cryptography argon2-cffi

      - name: Run deadpgp qa --direct (runtime gate)
        run: python -m deadpgp.cli qa --direct

      - name: Run pytest (full test suite)
        run: pytest --tb=short -q

      - name: Run deadpgp doctor (repo structure validation)
        run: python -m deadpgp.cli doctor
